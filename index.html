```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🍪 Cookie's Shop 🔥</title>

<!-- 🔥 LINK PREVIEW (PUT YOUR COOKIE IMAGE URL HERE) -->
<meta property="og:title" content="🍪 Cookie's Shop">
<meta property="og:description" content="Best deals on games & items 🔥">
<meta property="og:image" content="https://i.imgur.com/yourcookie.png">
<meta property="og:type" content="website">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:system-ui;
background:#161a1d;
color:#f5f3f4;
overflow-x:hidden;
}

/* HEADER */
header{
background:linear-gradient(115deg,#660708,#a4161a,#ba181b);
padding:1.5rem;
text-align:center;
font-size:2rem;
font-weight:800;
}

/* CART BUTTON */
.cart-btn{
position:fixed;
top:20px;
right:20px;
background:#0b090a;
padding:10px 20px;
border-radius:50px;
cursor:pointer;
z-index:1000;
border:1px solid #e5383b;
}

/* CONTAINER */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* TABS */
.tabs{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:30px;
flex-wrap:wrap;
}

.tab{
padding:8px 20px;
border-radius:30px;
background:#0b090a;
cursor:pointer;
border:1px solid #999;
}

.tab.active{
background:#e5383b;
}

/* GRID */
.games{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
}

/* CARD */
.card{
background:#0b090a;
border-radius:25px;
overflow:hidden;
border:1px solid #660708;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card-img{
width:100%;
height:160px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
color:#e5383b;
font-weight:bold;
margin:10px 0;
}

/* BUTTON */
button{
width:100%;
padding:10px;
border:none;
border-radius:30px;
background:#ba181b;
color:white;
cursor:pointer;
}

/* CART PANEL */
.cart{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#0b090a;
padding:20px;
transition:0.3s;
z-index:1200;
}

.cart.active{
right:0;
}

.cart-item{
margin-bottom:10px;
}

</style>
</head>

<body>

<header>🍪 COOKIE'S SHOP 🔥</header>

<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
</div>

<div class="container">

<div class="tabs">
<div class="tab active" data-filter="all">All</div>
<div class="tab" data-filter="games">Games</div>
<div class="tab" data-filter="money">Money</div>
<div class="tab" data-filter="other">Other</div>
</div>

<div class="games" id="grid">

<!-- RUST -->
<div class="card" data-cat="games">
<img class="card-img" src="header.jpg">
<div class="card-content">
<h3>🦀 Rust</h3>
<div class="price">$3.99</div>
<button onclick="add('Rust',3.99)">Add</button>
</div>
</div>

<!-- FOREST -->
<div class="card" data-cat="games">
<img class="card-img" src="capsule_616x353.jpg">
<div class="card-content">
<h3>🌲 The Forest</h3>
<div class="price">$2.49</div>
<button onclick="add('The Forest',2.49)">Add</button>
</div>
</div>

<!-- DONUT -->
<div class="card" data-cat="money">
<img class="card-img" src="channels4_profile.jpg">
<div class="card-content">
<h3>🍩 Donut 1M</h3>
<div class="price">$0.10</div>
<button onclick="add('Donut',0.10)">Add</button>
</div>
</div>

<!-- MYSTERY BOX -->
<div class="card" data-cat="other">
<img class="card-img" src="Untitled design.png">
<div class="card-content">
<h3>🎁 Mystery Box</h3>
<div class="price">$1.99</div>
<button onclick="add('Mystery Box',1.99)">Add</button>
</div>
</div>

</div>
</div>

<script>
let cart=[];

function add(name,price){
cart.push({name,price});
document.getElementById("count").innerText=cart.length;
render();
}

function render(){
let html="";
cart.forEach((i,idx)=>{
html+=`<div class="cart-item">${i.name} - $${i.price}</div>`;
});
document.getElementById("cartItems").innerHTML=html;
}

function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* FILTER */
document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
tab.classList.add("active");

let filter=tab.dataset.filter;

document.querySelectorAll(".card").forEach(card=>{
if(filter==="all" || card.dataset.cat===filter){
card.style.display="block";
}else{
card.style.display="none";
}
});
};
});
</script>

</body>
</html>
```
